version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vendnest
      POSTGRES_PASSWORD: vendnest
      POSTGRES_DB: vendnest
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendnest -d vendnest"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
